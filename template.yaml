AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EHR Annotation Tool Backend SAM Template

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: nodejs20.x
    Architectures:
      - x86_64

Parameters:
  DocumentsBucketName:
    Type: String
    Description: Name of the S3 bucket for documents
  EhrTableName:
    Type: String
    Description: Name of the single DynamoDB table for EHR data
  GroqApiKey:
    Type: String
    Description: Groq API Key
  NotificationEmail:
    Type: String
    Description: Email address to receive DDoS alert notifications
  DdosRequestThreshold:
    Type: Number
    Default: 2000
    Description: Number of Lambda requests in 1 minute to trigger the kill switch
  EhrApiKeyVal:
    Type: String
    Description: API Key for Hono authentication
  OmopHubApiKey:
    Type: String
    Description: OMOPHub API Key


Resources:
  EhrBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: serverless-bundle.handler
      Timeout: 5
      ReservedConcurrentExecutions: 2 # Prevent run-away compute costs
      FunctionUrlConfig:
        AuthType: NONE
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          EHR_TABLE_NAME: !Ref EhrTableName
          DOCUMENTS_BUCKET_NAME: !Ref DocumentsBucketName
          ANNOTATION_QUEUE_URL: !Ref EhrAnnotationQueue
          API_KEY: !Ref EhrApiKeyVal
          OMOPHUB_API_KEY: !Ref OmopHubApiKey
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref EhrTableName
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EhrTableName}/index/*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EhrAnnotationQueue.QueueName

  EhrAnnotationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: worker-bundle.handler
      Timeout: 120
      ReservedConcurrentExecutions: 2 # Hard cap on LLM parallel processing
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EhrAnnotationQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          EHR_TABLE_NAME: !Ref EhrTableName
          DOCUMENTS_BUCKET_NAME: !Ref DocumentsBucketName
          OMOPHUB_API_KEY: !Ref OmopHubApiKey
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref EhrTableName
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EhrTableName}/index/*"

  EhrAnnotationQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EhrAnnotationDLQ.Arn
        maxReceiveCount: 3

  EhrAnnotationDLQ:
    Type: AWS::SQS::Queue

  EhrAnnotationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EhrAnnotationQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EhrAnnotationQueue.Arn

  EhrAnnotationBusRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Routes S3 ObjectCreated events to the Annotation Queue"
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref DocumentsBucketName
          object:
            key:
              - prefix: "documents/"
      State: ENABLED
      Targets:
        - Arn: !GetAtt EhrAnnotationQueue.Arn
          Id: "EhrAnnotationQueueTarget"

  EhrTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref EhrTableName
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: SKIndex
          KeySchema:
            - AttributeName: SK
              KeyType: HASH
            - AttributeName: PK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI1Index
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST


  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref DocumentsBucketName
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true



  EhrKillSwitchTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "EhrKillSwitchTopic-${AWS::StackName}"
      Subscription:
        - Endpoint: !Ref NotificationEmail
          Protocol: email

  EhrLambdaTrafficAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: !Sub "Triggered if backend Lambda requests (Invocations + Throttles) exceed ${DdosRequestThreshold} in 1 minute. Triggers Kill Switch."
      EvaluationPeriods: 1
      Threshold: !Ref DdosRequestThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref EhrKillSwitchTopic
      TreatMissingData: notBreaching
      Metrics:
        - Id: e1
          Expression: m1 + m2
          Label: TotalRequests
          ReturnData: true
        - Id: m1
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref EhrBackendFunction
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: m2
          MetricStat:
            Metric:
              Namespace: AWS/Lambda
              MetricName: Throttles
              Dimensions:
                - Name: FunctionName
                  Value: !Ref EhrBackendFunction
            Period: 60
            Stat: Sum
          ReturnData: false

  EhrLambdaKillSwitchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: kill-switch-bundle.handler
      Runtime: nodejs20.x
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          BACKEND_FUNCTION_NAME: !Ref EhrBackendFunction
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - lambda:PutFunctionConcurrency
                - lambda:DeleteFunctionConcurrency
              Resource: !GetAtt EhrBackendFunction.Arn
      Events:
        SnsEvent:
          Type: SNS
          Properties:
            Topic: !Ref EhrKillSwitchTopic

  EhrAuditLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-audit-logs-${AWS::AccountId}"
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule:
          DefaultRetention:
            Mode: COMPLIANCE
            Days: 1
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  EhrFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ehr-annotation-backend-firehose-${AWS::Region}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseWriteS3
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt EhrAuditLogsBucket.Arn
                  - !Sub "${EhrAuditLogsBucket.Arn}/*"

  EhrAuditDeliveryStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "${AWS::StackName}-AuditDeliveryStream"
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt EhrAuditLogsBucket.Arn
        BufferingHints:
          IntervalInSeconds: 900
          SizeInMBs: 5
        CompressionFormat: GZIP
        RoleARN: !GetAtt EhrFirehoseRole.Arn

  EhrAuditStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: audit-consumer-bundle.handler
      Timeout: 30
      MemorySize: 128
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt EhrTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 100
      Environment:
        Variables:
          AUDIT_DELIVERY_STREAM_NAME: !Ref EhrAuditDeliveryStream
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - firehose:PutRecord
                - firehose:PutRecordBatch
              Resource: !GetAtt EhrAuditDeliveryStream.Arn

Outputs:
  ApiEndpoint:
    Description: "Lambda Function URL"
    Value: !GetAtt EhrBackendFunctionUrl.FunctionUrl

  EhrAnnotationQueueUrl:
    Description: "URL of the Annotation SQS Queue"
    Value: !Ref EhrAnnotationQueue

  EhrAnnotationDLQUrl:
    Description: "URL of the Dead Letter Queue"
    Value: !Ref EhrAnnotationDLQ
