AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EHR Annotation Tool Backend SAM Template

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64

Parameters:
  DocumentsBucketName:
    Type: String
    Description: Name of the S3 bucket for documents
  DocumentsTableName:
    Type: String
    Description: Name of the DynamoDB table for documents
  AnnotationsTableName:
    Type: String
    Description: Name of the DynamoDB table for annotations
  GroqApiKey:
    Type: String
    Description: Groq API Key

Resources:
  EhrApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      MethodSettings:
        - HttpMethod: '*'
          ResourcePath: '/*'
          ThrottlingBurstLimit: 2
          ThrottlingRateLimit: 5

  EhrBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: serverless-bundle.handler
      Events:
        ProxyApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref EhrApiGateway
            Path: /
            Method: ANY
        ProxyApiGreedy:
          Type: Api
          Properties:
            RestApiId: !Ref EhrApiGateway
            Path: /{proxy+}
            Method: ANY
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          DOCUMENTS_TABLE_NAME: !Ref DocumentsTableName
          ANNOTATIONS_TABLE_NAME: !Ref AnnotationsTableName
          DOCUMENTS_BUCKET_NAME: !Ref DocumentsBucketName
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AnnotationsTableName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt EhrAnnotationQueue.QueueName

  EhrAnnotationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/
      Handler: worker-bundle.handler
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt EhrAnnotationQueue.Arn
            BatchSize: 5
      Environment:
        Variables:
          GROQ_API_KEY: !Ref GroqApiKey
          DOCUMENTS_TABLE_NAME: !Ref DocumentsTableName
          ANNOTATIONS_TABLE_NAME: !Ref AnnotationsTableName
          DOCUMENTS_BUCKET_NAME: !Ref DocumentsBucketName
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref DocumentsBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTableName
        - DynamoDBCrudPolicy:
            TableName: !Ref AnnotationsTableName

  EhrAnnotationQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EhrAnnotationDLQ.Arn
        maxReceiveCount: 3

  EhrAnnotationDLQ:
    Type: AWS::SQS::Queue

  EhrAnnotationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EhrAnnotationQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EhrAnnotationQueue.Arn
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${DocumentsBucketName}"

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref DocumentsTableName
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  AnnotationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref AnnotationsTableName
      AttributeDefinitions:
        - AttributeName: annotationId
          AttributeType: S
        - AttributeName: documentId
          AttributeType: S
      KeySchema:
        - AttributeName: annotationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DocumentIdIndex
          KeySchema:
            - AttributeName: documentId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST

  DocumentsBucket:
    Type: AWS::S3::Bucket
    DependsOn: EhrAnnotationQueuePolicy
    Properties:
      BucketName: !Ref DocumentsBucketName
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt EhrAnnotationQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: documents/
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${EhrApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/"

  EhrAnnotationQueueUrl:
    Description: "URL of the Annotation SQS Queue"
    Value: !Ref EhrAnnotationQueue

  EhrAnnotationDLQUrl:
    Description: "URL of the Dead Letter Queue"
    Value: !Ref EhrAnnotationDLQ
