name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'packages/backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'template.yaml'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build backend application
        run: bun run --filter backend build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::479650866443:role/github-actions-deploy-role
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install esbuild globally
        run: npm install -g esbuild

      - name: SAM Build
        run: sam build --no-cached

      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ehr-annotation-backend \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --resolve-s3 \
            --resolve-image-repos \
            --parameter-overrides \
              DocumentsBucketName=${{ secrets.DOCUMENTS_BUCKET_NAME }} \
              EhrTableName=${{ secrets.EHR_TABLE_NAME }} \
              NotificationEmail=${{ secrets.NOTIFICATION_EMAIL }} \
              EhrApiKeyVal=${{ secrets.VITE_API_KEY }} \
              OmopHubApiKey=${{ secrets.OMOPHUB_API_KEY }} \
              SageMakerModelDataUrl=s3://${{ secrets.DOCUMENTS_BUCKET_NAME }}/models/gliner-relex/model-base-v1.0.tar.gz \
              DdosRequestThreshold=2000
